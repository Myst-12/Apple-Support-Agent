<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Demo Apple Support — Get instant AI-powered help with all your Apple products, from iPhone to Mac." />
  <meta name="theme-color" content="#ffffff" />
  <title>Demo Apple Support</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- SF Pro fallback via Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<!-- ═══════════════════════════════════════════
     HEADER
═══════════════════════════════════════════ -->
<header id="header" role="banner">
  <div class="header-logo">
    <button id="home-btn" class="home-btn" aria-label="Go to home" title="Demo Apple Support Home">
      <svg class="apple-logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 1000" aria-hidden="true">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.3-156.8-109.2c-60.1-81.1-101.4-205.7-101.4-324.1 0-194.3 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
      </svg>
    </button>
  </div>

  <h1 class="header-title"><span class="demo-badge">Demo</span> Apple Support</h1>

  <div class="header-status" aria-label="Agent status: Online" role="status">
    <div class="status-dot" aria-hidden="true"></div>
    <span class="status-text">Online</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     APP WRAPPER
═══════════════════════════════════════════ -->
<div id="app" role="main">

  <!-- ── WELCOME SCREEN ── -->
  <section id="welcome-screen" aria-label="Welcome" aria-live="polite">
    <div class="welcome-logo" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 814 1000">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.3-156.8-109.2c-60.1-81.1-101.4-205.7-101.4-324.1 0-194.3 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
      </svg>
    </div>

    <h2 class="welcome-heading">Hello.<br>How can we help?</h2>
    <p class="welcome-subheading">Ask anything about your Apple products — Demo</p>

    <!-- Welcome input bar -->
    <div class="welcome-input-wrapper" id="welcome-input-wrapper">
      <textarea
        id="welcome-input"
        placeholder="Message Demo Apple Support…"
        rows="1"
        aria-label="Type your message to start"
        autocomplete="off"
        autocorrect="on"
        spellcheck="true"
      ></textarea>
      <button id="welcome-send-btn" aria-label="Send message" title="Send" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="13 6 19 12 13 18"/>
        </svg>
      </button>
    </div>

    <p class="or-divider">or try a suggestion</p>

    <div class="suggestion-chips" role="list" aria-label="Suggested questions">
      <button class="chip" role="listitem" aria-label="Ask: My iPhone won't turn on">My iPhone won't turn on</button>
      <button class="chip" role="listitem" aria-label="Ask: Reset my Apple ID">Reset my Apple ID</button>
      <button class="chip" role="listitem" aria-label="Ask: iCloud storage issues">iCloud storage issues</button>
      <button class="chip" role="listitem" aria-label="Ask: Battery draining fast">Battery draining fast</button>
    </div>
  </section>

  <!-- ── CHAT INTERFACE ── -->
  <section id="chat-interface" aria-label="Chat with Demo Apple Support" aria-live="polite">

    <!-- Chat top bar -->
    <div class="chat-topbar">
      <button
        id="new-convo-btn"
        class="new-convo-btn"
        aria-label="Start a new conversation"
        title="New conversation"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-4.21"></path>
        </svg>
        New conversation
      </button>
    </div>

    <!-- Messages -->
    <div
      id="messages-container"
      role="log"
      aria-label="Conversation messages"
      aria-relevant="additions"
    >
      <!-- Typing indicator lives at the bottom of the scroll -->
      <div id="typing-indicator" role="status" aria-label="Apple Support is typing">
        <div class="typing-bubble" aria-hidden="true">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      </div>
    </div>

    <!-- Scroll to bottom -->
    <button
      id="scroll-btn"
      aria-label="Scroll to latest message"
      title="Scroll to bottom"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>

    <!-- Input area -->
    <div id="input-area" role="form" aria-label="Send a message">
      <div class="input-wrapper">
        <textarea
          id="message-input"
          placeholder="Message Demo Apple Support…"
          rows="1"
          aria-label="Type your message"
          aria-multiline="true"
          autocomplete="off"
          autocorrect="on"
          spellcheck="true"
        ></textarea>

        <button
          id="send-btn"
          disabled
          aria-label="Send message"
          title="Send"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="13 6 19 12 13 18"/>
          </svg>
        </button>
      </div>
    </div>

  </section>

</div><!-- /#app -->

<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
